name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Paris
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Date du build (Europe/Paris)
        id: builddate
        run: |
          D=$(date +%Y-%m-%d)
          echo "date=$D" >> "$GITHUB_OUTPUT"
          echo "CARBUWEB_BUILD_DATE=$D" >> "$GITHUB_ENV"

      - name: Cache mapping OpenStreetMap (journalier)
        id: osm-cache
        uses: actions/cache@v5
        with:
          path: datasets/osm_mapping-${{ steps.builddate.outputs.date }}.json
          key: osm-mapping-fr-${{ steps.builddate.outputs.date }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Cache environnement Python (.venv)
        id: venv-cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py314-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-py314-

      - name: Installer les dépendances
        run: |
          set -euo pipefail
          if [ ! -x .venv/bin/python ]; then
            python -m venv .venv
          fi
          .venv/bin/pip install -q -U pip wheel
          .venv/bin/pip install -q -r requirements.txt

      - name: Statut caches
        run: |
          if [ "${{ steps.osm-cache.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::Cache OSM — pas d'appel Overpass pour ${{ steps.builddate.outputs.date }}."
          else
            echo "::notice::Pas de cache OSM — téléchargement Overpass si nécessaire."
          fi
          if [ "${{ steps.venv-cache.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::Cache .venv — dépendances restaurées (hash requirements.txt)."
          else
            echo "::notice::Pas de cache .venv complet — pip a installé ou mis à jour les paquets."
          fi

      - name: Build
        run: .venv/bin/python main.py

      - name: Push build to pages branch
        run: |
          cd build
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b pages
          git add -A
          git commit -m "Build $(date -u +%Y-%m-%d)"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" pages
