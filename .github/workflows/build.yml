name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Paris

    steps:
      - uses: actions/checkout@v6

      - name: Date du build (Europe/Paris)
        id: builddate
        run: |
          D=$(date +%Y-%m-%d)
          echo "date=$D" >> "$GITHUB_OUTPUT"
          echo "CARBUWEB_BUILD_DATE=$D" >> "$GITHUB_ENV"

      - name: Cache mapping OpenStreetMap (journalier)
        id: osm-cache
        uses: actions/cache@v5
        with:
          path: datasets/osm_mapping-${{ steps.builddate.outputs.date }}.json
          key: osm-mapping-fr-${{ steps.builddate.outputs.date }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Statut cache OSM
        run: |
          if [ "${{ steps.osm-cache.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::Cache OSM — pas d'appel Overpass pour ${{ steps.builddate.outputs.date }}."
          else
            echo "::notice::Pas de cache OSM — téléchargement Overpass si nécessaire."
          fi

      - run: python main.py

      - name: Push build to pages branch
        run: |
          cd build
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b pages
          git add -A
          git commit -m "Build $(date -u +%Y-%m-%d)"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" pages
